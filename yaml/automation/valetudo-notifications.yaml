blueprint:
  name: 'Valetudo: Notifications'
  description: >-
    Sends a notification after a successful clean-up run and on error.
    Supports multiple robots in a single automation — add one entry per robot in the same order
    for each of the per-robot selectors (Vacuum, Error Message, Rendered Map, Status Flag).
  source_url: https://github.com/vordenken/ha-valetudo-blueprints/blob/main/yaml/automation/valetudo-notifications.yaml
  domain: automation
  homeassistant:
    min_version: 2022.6.0
  input:
    vacuum:
      name: Vacuum Robot(s)
      description: >-
        One or more vacuum robot entities. When using multiple robots, keep the order consistent
        with the other per-robot selectors below.
      selector:
        entity:
          domain: vacuum
          integration: mqtt
          multiple: true
    rendered_map:
      name: Rendered Map(s)
      description: >-
        The vacuum map(s) rendered as a camera entity (e.g. via HACS valetudo_vacuum_camera).
        Add one camera entity per robot in the same order as the robots above. Leave empty to
        send notifications without a map image.
      default: []
      selector:
        entity:
          filter:
            - domain: camera
              integration: mqtt
            - domain: camera
              integration: mqtt_vacuum_camera
          multiple: true
    error_message:
      name: Error Message Sensor(s)
      description: >-
        The sensor(s) containing the last error message.
        One sensor per robot, in the same order as the robots above.
      selector:
        entity:
          domain: sensor
          integration: mqtt
          multiple: true
    status_flag:
      name: Status Flag Sensor(s)
      description: >-
        The sensor(s) containing the status flag of each robot (used to skip notifications when a
        cleaning task is resumable). One sensor per robot, same order as robots. Leave empty to
        always send notifications.
      default: []
      selector:
        entity:
          domain: sensor
          integration: mqtt
          multiple: true
    dashboard_url:
      name: Dashboard URL
      description: The dashboard that should be opened when tapping on the notification.
      default: '/lovelace/'
      selector:
        text:
          type: url
    notify_device:
      name: Notification Device(s)
      description: The notified device(s).
      default: false
      selector:
        device:
          integration: mobile_app
          multiple: true
    notify_group:
      name: Notification Group
      description: "The name of the notification group to call. ('notify' for all devices)"
      default: ""
    ticker_enabled:
      name: Use Ticker Integration
      description: "Enable to use the Ticker integration (https://github.com/analytix-energy-solutions/ticker) instead of direct device notifications."
      default: false
      selector:
        boolean:
    ticker_category:
      name: Ticker Category
      description: "The Ticker category to use for notifications (e.g. 'vacuum'). Only used when Ticker is enabled."
      default: "vacuum"
      selector:
        text:
    language:
      name: Language
      description: The language used for the notifications.
      default: English
      selector:
        select:
          options:
            - English
            - French
            - German
            - Italian

trigger_variables:
  vacuum_entities: !input vacuum
  error_entities: !input error_message
  rendered_map_entities: !input rendered_map
  status_flag_entities: !input status_flag
  notify_devices: !input notify_device
  group_target: !input notify_group
  use_ticker: !input ticker_enabled
  ticker_cat: !input ticker_category
  language: !input language

trigger:
  - platform: state
    entity_id: !input vacuum
    from: cleaning
    to: returning
    for:
      hours: 0
      minutes: 0
      seconds: 5
    id: cleaning_finished
    variables:
      msg_type: success_msg
  - platform: state
    entity_id: !input vacuum
    to: error
    for:
      hours: 0
      minutes: 0
      seconds: 5
    id: error
    variables:
      msg_type: error_msg

condition:
  - condition: or
    alias: "Finished cleaning task or error message is not empty"
    conditions:
      - condition: trigger
        id: cleaning_finished
      - condition: template
        value_template: >-
          {% set idx = vacuum_entities.index(trigger.entity_id) if trigger.entity_id in vacuum_entities else 0 %}
          {{ states(error_entities[idx]) != '' }}

variables:
  vacuum_id: "{{ trigger.entity_id }}"
  vacuum_name: '{{ device_attr(vacuum_id, "name_by_user") or device_attr(vacuum_id, "name") }}'
  error_message_sensor: >-
    {%- set idx = vacuum_entities.index(trigger.entity_id) if trigger.entity_id in vacuum_entities else 0 -%}
    {{ error_entities[idx] }}
  rendered_map_sensor: >-
    {%- set idx = vacuum_entities.index(trigger.entity_id) if trigger.entity_id in vacuum_entities else 0 -%}
    {%- if rendered_map_entities | length > idx -%}{{ rendered_map_entities[idx] }}{%- endif -%}
  status_flag_sensor: >-
    {%- set idx = vacuum_entities.index(trigger.entity_id) if trigger.entity_id in vacuum_entities else 0 -%}
    {%- if status_flag_entities | length > idx -%}{{ status_flag_entities[idx] }}{%- endif -%}
  strings:
    English:
      title: "Vacuum {{ vacuum_name }}"
      success_msg: "Cleaning task succeeded at {{ now().strftime('%-H:%M') }}."
      error_msg: "The robot has encountered an issue: {{ states( error_message_sensor ) }}"
      default_msg: "Everything is working fine."
    French:
      title: "Aspirateur {{ vacuum_name }}"
      success_msg: "Nettoyage terminé à {{ now().strftime('%-H:%M') }}."
      error_msg: "Le robot à rencontré une erreur: {{ states( error_message_sensor ) }}"
      default_msg: "Tout va bien"
    German:
      title: "Staubsauger {{ vacuum_name }}"
      success_msg: "Die Reinigung wurde um {{ now().strftime('%-H:%M') }} Uhr erfolgreich abgeschlossen."
      error_msg: "Der Staubsauger hat ein Problem: {{ states( error_message_sensor ) }}"
      default_msg: Alles gut.
    Italian:
      title: "Aspirapolvere {{ vacuum_name }}"
      success_msg: "La pulizia è stata completata con successo alle {{ now().strftime('%-H:%M') }}."
      error_msg: "Il robot ha riscontrato un errore: {{ states( error_message_sensor ) }}"
      default_msg: "Tutto funziona regolarmente."
  notify_channel:
    success_msg: "Valetudo Success"
    error_msg: "Valetudo Error"
  notify_targets: >-
    {% set ns = namespace(targets=[]) %}
    {% if notify_devices is iterable %}
      {% for device_id in notify_devices -%}
        {% if device_id -%}
          {% set ns.targets = ns.targets + [ "notify.mobile_app_" ~ device_attr( device_id, 'name' )|slugify ] %}
        {%- endif %}
      {%- endfor %}
    {%- endif %}
    {% if group_target is defined and group_target is string and group_target != '' %}
      {% set ns.targets = ns.targets + [ "notify." ~ group_target|slugify ] %}
    {%- endif %}
    {{ ns.targets }}
  title: "{{ strings[language]['title'] }}"
  message: "{{ strings[language][msg_type] | default(strings[language]['default_msg']) }}"
  data:
    # Android map
    image: "{{ ('/api/camera_proxy/' ~ rendered_map_sensor) if rendered_map_sensor else none }}"
    # iOS map
    entity_id: "{{ rendered_map_sensor if rendered_map_sensor else none }}"
    priority: high
    # iOS URL
    url: !input dashboard_url
    # Android URL
    clickAction: !input dashboard_url
    channel: "{{ notify_channel[msg_type] | default('General') }}"

action:
  - if:
      - alias: "If cleaning is potentially finished"
        condition: trigger
        id: cleaning_finished
    then:
      - alias: "Wait for docking"
        wait_for_trigger:
          - platform: state
            entity_id: "{{ vacuum_id }}"
            from: returning
            to: docked
            for:
              hours: 0
              minutes: 0
              seconds: 5
        timeout:
          minutes: 30
      - if:
          - alias: "If cleaning is resumable"
            condition: template
            value_template: "{{ status_flag_sensor != '' and is_state(status_flag_sensor, 'resumable') }}"
        then:
          - stop: "No notification is necessary"
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ use_ticker }}"
        sequence:
          - service: ticker.notify
            data:
              category: "{{ ticker_cat }}"
              title: "{{ title }}"
              message: "{{ message }}"
              data: "{{ data }}"
    default:
      - repeat:
          for_each: "{{ notify_targets }}"
          sequence:
            - service: "{{ repeat.item }}"
              data:
                title: "{{ title }}"
                message: "{{ message }}"
                data: "{{ data }}"

mode: parallel
max: 5
